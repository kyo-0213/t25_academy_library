<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍登録</div>
                <div class="page_contents">
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/add}" method="post">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="color:red; font-size: 0.8em;" >*は必須項目です</span>
                            <a th:href="@{/book/index}" class="link" style="font-size: 0.8em;">← 一覧へ戻る</a>
                        </div><br>
                        <div class="form_block">
                            <label for="title">書籍名<span style="color:red;">*</span></label><br>
                            <input type="text" id="title" th:field="*{title}" placeholder="書籍名を入力" style="font-size: 15px; padding: 10px; width: 100%; border: 2px solid #ccc; border-radius: 4px;"><br>
                            <div th:if="${errorMsgTitle}" th:text="${errorMsgTitle}" class="error" style="color:red; font-size: 0.5em;">
                            </div>
                        </div>
                        <div class="form_block">
                            <label for="isbn">ISBN<span style="color:red;">*</span></label><br>
                            <input type="text" id="isbn" th:field="*{isbn}" placeholder="ISBNを入力" style="font-size: 15px; padding: 10px; width: 100%; border: 2px solid #ccc; border-radius: 4px;"><br>
                            <div th:if="${not #lists.isEmpty(errorIsbnList)}" th:each="error : ${errorIsbnList}" class="error" style="color:red; font-size: 0.5em;">
                                <p th:text="${error}"></p>
                            </div>
                            <br>
                        </div>
                        <div class="mb30 flexarea">
                            <button type="submit" style="display: block; margin: 0 auto; background-color: #90EE90; padding: 10px 20px; border-radius: 8px; text-decoration: none; color: black; border: none;">
                                保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
